<!doctype html>
<html lang="pt-AO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8fafc" />
    <meta
      name="description"
      content="Painel administrativo da Plataforma de Otimização Acadêmica da Universidade Metropolitana de Angola / IMETRO."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      (function initializeTheme() {
        try {
          var storedTheme = localStorage.getItem("academic-platform-theme");
          var systemTheme = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
          var theme = storedTheme === "dark" || storedTheme === "light"
            ? storedTheme
            : systemTheme;
          var root = document.documentElement;

          root.classList.toggle("dark", theme === "dark");
          root.dataset.theme = theme;
          root.style.colorScheme = theme;
        } catch (error) {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>

    <title>IMETRO | Plataforma de Otimização Acadêmica</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
