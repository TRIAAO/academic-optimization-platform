spring:
  application:
    name: academic-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5439/academic_optimization_db}
    username: ${SPRING_DATASOURCE_USERNAME:academic_user}
    password: ${SPRING_DATASOURCE_PASSWORD:academic_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

app:
  name: Academic Optimization Platform
  company: TRIA Company

  jwt:
    secret: ${JWT_SECRET:tria-company-academic-platform-dev-secret-key-change-in-production-2026}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

  orcid:
    base-url: ${ORCID_BASE_URL:https://pub.orcid.org/v3.0}