server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: academic-api

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/academic_optimization_db}
    username: ${DATABASE_USERNAME:academic_user}
    password: ${DATABASE_PASSWORD:academic_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: false

app:
  name: Academic Optimization Platform
  company: TRIA Company

  jwt:
    secret: ${JWT_SECRET:tria-company-academic-platform-dev-secret-key-change-in-production-2026}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}

  orcid:
    base-url: ${ORCID_BASE_URL:https://pub.orcid.org/v3.0}

    oauth:
      enabled: ${ORCID_OAUTH_ENABLED:false}
      authorization-url: ${ORCID_OAUTH_AUTHORIZATION_URL:https://orcid.org/oauth/authorize}
      token-url: ${ORCID_OAUTH_TOKEN_URL:https://orcid.org/oauth/token}
      revoke-url: ${ORCID_OAUTH_REVOKE_URL:https://orcid.org/oauth/revoke}
      client-id: ${ORCID_OAUTH_CLIENT_ID:}
      client-secret: ${ORCID_OAUTH_CLIENT_SECRET:}
      redirect-uri: ${ORCID_OAUTH_REDIRECT_URI:https://academic-api.triacompany.com/api/v1/orcid/oauth/callback}
      frontend-redirect-uri: ${ORCID_OAUTH_FRONTEND_REDIRECT_URI:https://academic-optimization-platform.vercel.app/admin/orcid}
      scope: ${ORCID_OAUTH_SCOPE:/authenticate}
      state-secret: ${ORCID_OAUTH_STATE_SECRET:}
      state-ttl-minutes: ${ORCID_OAUTH_STATE_TTL_MINUTES:10}
      token-encryption-key: ${ORCID_OAUTH_TOKEN_ENCRYPTION_KEY:}

  openalex:
    base-url: ${OPENALEX_BASE_URL:https://api.openalex.org}
    mailto: ${OPENALEX_MAILTO:geral@triacompany.com}

  crossref:
    base-url: ${CROSSREF_BASE_URL:https://api.crossref.org}
    mailto: ${CROSSREF_MAILTO:geral@triacompany.com}

logging:
  level:
    root: INFO
    com.triacompany.academic: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
